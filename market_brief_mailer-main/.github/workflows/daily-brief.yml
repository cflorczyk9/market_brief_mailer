name: Daily Market Brief

on:
  schedule:
    - cron: "0 10 * * 1-5"  # 12:00 UTC = 7am EST (weekdays)
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Send only to Connor (test mode)"
        type: boolean
        default: true

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install yfinance
      - name: Generate and send
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          UNSUBSCRIBE_BASE_URL: ${{ secrets.UNSUBSCRIBE_BASE_URL }}
          SUBSCRIBE_URL: ${{ secrets.SUBSCRIBE_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            python generate_and_send.py --test
          else
            python generate_and_send.py
          fi
